[pytest]
# Exclude the UTF-16 encoded output file that causes a UnicodeDecodeError
# when pytest tries to collect it as a doctest file.
addopts = --ignore=test_output.txt

# Ensure the project root is on sys.path so blueprints/models/etc are importable
# without installing the package, which avoids ModuleNotFoundError on test runs.
pythonpath = .

# Treat DeprecationWarning as an error only for our own code; ignore noisy
# third-party warnings (SQLAlchemy LegacyAPIWarning, etc.) that are not
# actionable at this stage of the project.
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:flask_sqlalchemy
